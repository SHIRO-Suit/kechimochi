<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover interactive-widget=resizes-content" />
    <title>Kechimochi Activity Tracker</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <script type="module" src="/src/theme_sync.ts"></script>
    <div id="app" data-boot-state="loading">
      <!-- Topbar -->
      <!-- Title Bar -->
      <div class="title-bar" id="desktop-title-bar">
        <div class="logo" data-tauri-drag-region style="display: flex; align-items: center; gap: 0.5rem; flex: 1; height: 100%;">
          <img src="/logo.png" style="height: 20px; width: 20px;" alt="Logo" />
          <h1 style="margin: 0; font-size: 0.85rem; font-weight: 500;">ケチモチ</h1>
        </div>
        <div class="window-controls">
           <button class="win-btn" id="win-min" title="Minimize">
              <svg width="10" height="10" viewBox="0 0 12 12"><rect fill="currentColor" x="1" y="5" width="10" height="1.5"/></svg>
           </button>
           <button class="win-btn" id="win-max" title="Maximize">
              <svg width="10" height="10" viewBox="0 0 12 12"><rect fill="none" stroke="currentColor" stroke-width="1.2" x="2" y="2" width="8" height="8"/></svg>
           </button>
           <button class="win-btn win-btn-close" id="win-close" title="Close">
              <svg width="10" height="10" viewBox="0 0 12 12"><path fill="currentColor" d="M10.5,2.5,9.5,1.5,6,5,2.5,1.5,1.5,2.5,5,6,1.5,9.5,2.5,10.5,6,7,9.5,10.5,10.5,9.5,7,6Z"/></svg>
           </button>
        </div>
      </div>

      <!-- Navigation Bar -->
      <header class="app-nav-bar">
        <nav class="topbar-nav" id="main-nav">
          <a class="nav-link active" data-view="dashboard">
            <span class="nav-link-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13h8V3H3z"></path><path d="M13 21h8v-6h-8z"></path><path d="M13 3h8v8h-8z"></path><path d="M3 21h8v-4H3z"></path></svg>
            </span>
            <span class="nav-link-label">Dashboard</span>
          </a>
          <a class="nav-link" data-view="media">
            <span class="nav-link-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            </span>
            <span class="nav-link-label">Library</span>
          </a>
          <a class="nav-link" data-view="timeline">
            <span class="nav-link-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2"></circle><circle cx="18" cy="12" r="2"></circle><circle cx="6" cy="18" r="2"></circle><path d="M8 6h3"></path><path d="M8 18h3"></path><path d="M16 12H12"></path><path d="M 12,3 V 21 "></path></svg>
            </span>
            <span class="nav-link-label">Timeline</span>
          </a>
          <a class="nav-link" data-view="profile">
            <span class="nav-link-icon nav-link-icon--profile" aria-hidden="true">
              <span class="profile-avatar profile-avatar-nav" id="nav-profile-tab-avatar">
                <span class="profile-avatar-fallback" id="nav-profile-tab-avatar-fallback">U</span>
                <img id="nav-profile-tab-avatar-image" class="profile-avatar-image" alt="Profile tab avatar" style="display: none;" />
              </span>
            </span>
            <span class="nav-link-label">Profile</span>
          </a>
        </nav>

        <div id="nav-spacer"></div>

        <div id="nav-controls-row">
          <div class="dev-build-label" id="dev-build-badge" style="display: none;">Development Build</div>
          <button class="update-available-badge" id="update-available-badge" style="display: none;" type="button">New update available</button>
          <button class="nav-sync-status-btn" id="nav-sync-status-btn" type="button" style="display: none;" aria-label="Sync status">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15.55-6.36L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15.55 6.36L3 16"></path></svg>
            <span class="sync-status-dot" id="nav-sync-status-dot" aria-hidden="true"></span>
          </button>
          <div id="nav-profile-controls" style="background: var(--bg-dark); padding: 0.2rem 0.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; min-width: 80px; gap: 0.5rem;">
             <div class="profile-avatar profile-avatar-nav" id="nav-user-avatar">
               <span class="profile-avatar-fallback" id="nav-user-avatar-fallback">U</span>
               <img id="nav-user-avatar-image" class="profile-avatar-image" alt="User profile" style="display: none;" />
             </div>
             <span id="nav-user-name" style="font-size: 0.9rem; font-weight: 500; cursor: default;">User</span>
          </div>
        </div>

        <button class="btn btn-primary" id="btn-add-activity"><span class="activity-btn-text">Log Activity</span><span class="activity-btn-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span></button>
      </header>

      <div class="mobile-top-bar" id="mobile-top-bar">
        <div class="dev-build-label mobile-build-badge" id="mobile-build-badge" style="display: none;">Beta</div>
        <button class="mobile-sync-status-btn" id="mobile-sync-status-btn" type="button" style="display: none;" aria-label="Sync status">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15.55-6.36L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15.55 6.36L3 16"></path></svg>
          <span class="sync-status-dot mobile-sync-status-dot" id="mobile-sync-status-dot" aria-hidden="true"></span>
        </button>
      </div>
      <!-- Main Content Area -->
      <main class="main-content" id="view-container">
        <!-- Views will be dynamically injected here -->
      </main>

      <output class="app-startup-loader" id="app-startup-loader" aria-label="Loading">
        <span class="app-startup-loader__spinner" aria-hidden="true"></span>
      </output>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
